<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 200" role="img" aria-label="dpv slim output example">
  <title>dpv slim output example</title>
  <style>
    text {
      font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', 'Menlo', monospace;
      font-size: 13px;
    }
    .dim   { fill: #6c7086; }
    .norm  { fill: #cdd6f4; }
    .green { fill: #a6e3a1; }
    .blue  { fill: #89b4fa; }
    .cyan  { fill: #89dceb; }
    .red   { fill: #f38ba8; }
    .bold  { font-weight: bold; }
  </style>

  <rect width="660" height="200" rx="10" ry="10" fill="#1e1e2e"/>

  <circle cx="20" cy="20" r="6" fill="#f38ba8"/>
  <circle cx="40" cy="20" r="6" fill="#f9e2af"/>
  <circle cx="60" cy="20" r="6" fill="#a6e3a1"/>
  <text x="330" y="25" text-anchor="middle" class="dim" font-size="12">dpv -s</text>
  <line x1="0" y1="36" x2="660" y2="36" stroke="#313244" stroke-width="1"/>

  <text x="18" y="60">
    <tspan class="dim">&gt; </tspan><tspan class="green">2 running</tspan><tspan class="dim"> . </tspan><tspan class="norm">1 stopped</tspan><tspan class="dim"> . </tspan><tspan class="norm">3 total</tspan>
  </text>

  <text x="26" y="86"><tspan class="green bold">&#x25CF;</tspan><tspan class="blue"> fortigate-prometheus</tspan></text>
  <text x="26" y="110"><tspan class="green bold">&#x25CF;</tspan><tspan class="cyan"> fortigate-grafana</tspan></text>
  <text x="26" y="134"><tspan class="red bold">&#x25CB;</tspan><tspan class="dim"> old-worker</tspan></text>

  <text x="18" y="164"><tspan class="dim">Tip: </tspan><tspan class="norm">dpv -s -i=cp</tspan><tspan class="dim"> shows created + ports under each name</tspan></text>
</svg>
