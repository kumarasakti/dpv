<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 500" role="img" aria-label="dpv pretty output example">
  <title>dpv pretty output example</title>
  <style>
    text {
      font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', 'Menlo', monospace;
      font-size: 13px;
    }
    .dim    { fill: #6c7086; }
    .norm   { fill: #cdd6f4; }
    .green  { fill: #a6e3a1; }
    .blue   { fill: #89b4fa; }
    .cyan   { fill: #89dceb; }
    .yellow { fill: #f9e2af; }
    .red    { fill: #f38ba8; }
    .bold   { font-weight: bold; }
    .label  { fill: #cdd6f4; font-weight: bold; }
  </style>

  <!-- terminal background -->
  <rect width="660" height="500" rx="10" ry="10" fill="#1e1e2e"/>

  <!-- traffic lights -->
  <circle cx="20" cy="20" r="6" fill="#f38ba8"/>
  <circle cx="40" cy="20" r="6" fill="#f9e2af"/>
  <circle cx="60" cy="20" r="6" fill="#a6e3a1"/>
  <text x="330" y="25" text-anchor="middle" class="dim" font-size="12">dpv -a</text>

  <!-- separator -->
  <line x1="0" y1="36" x2="660" y2="36" stroke="#313244" stroke-width="1"/>

  <!-- summary bar -->
  <text x="18" y="58">
    <tspan class="dim">&gt; </tspan><tspan class="green">2 running</tspan><tspan class="dim"> . </tspan><tspan class="norm">1 stopped</tspan><tspan class="dim"> . </tspan><tspan class="norm">3 total</tspan>
  </text>

  <!-- card 1 -->
  <rect x="14" y="68" width="630" height="178" rx="6" ry="6" fill="none" stroke="#45475a" stroke-width="1"/>
  <text x="26" y="89"><tspan class="green bold">&#x25CF;</tspan><tspan class="blue bold"> fortigate-prometheus</tspan></text>
  <text x="34" y="109"><tspan class="label">Status:   </tspan><tspan class="norm">  Up 8 minutes</tspan></text>
  <text x="34" y="128"><tspan class="label">Created:  </tspan><tspan class="green">  8 minutes ago</tspan></text>
  <text x="34" y="147"><tspan class="label">Ports:    </tspan><tspan class="norm">  0.0.0.0:9091-&gt;9090/tcp</tspan></text>
  <text x="34" y="166"><tspan class="norm">            :::9091-&gt;9090/tcp</tspan></text>
  <text x="34" y="185"><tspan class="label">ID:       </tspan><tspan class="dim">  4d4ffc5640b7</tspan></text>
  <text x="34" y="204"><tspan class="label">Image:    </tspan><tspan class="norm">  prom/prometheus:latest</tspan></text>
  <text x="34" y="223"><tspan class="label">Command:  </tspan><tspan class="dim">  /bin/prometheus --config.file=/etc/prometheus/prometheus.ym&#x2026;</tspan></text>

  <!-- card 2 -->
  <rect x="14" y="260" width="630" height="158" rx="6" ry="6" fill="none" stroke="#45475a" stroke-width="1"/>
  <text x="26" y="281"><tspan class="green bold">&#x25CF;</tspan><tspan class="cyan bold"> fortigate-grafana</tspan></text>
  <text x="34" y="301"><tspan class="label">Status:   </tspan><tspan class="norm">  Up 8 minutes</tspan></text>
  <text x="34" y="320"><tspan class="label">Created:  </tspan><tspan class="green">  8 minutes ago</tspan></text>
  <text x="34" y="339"><tspan class="label">Ports:    </tspan><tspan class="norm">  0.0.0.0:3001-&gt;3000/tcp</tspan></text>
  <text x="34" y="358"><tspan class="label">ID:       </tspan><tspan class="dim">  30adb8e90077</tspan></text>
  <text x="34" y="377"><tspan class="label">Image:    </tspan><tspan class="norm">  grafana/grafana:latest</tspan></text>
  <text x="34" y="396"><tspan class="label">Command:  </tspan><tspan class="dim">  /run.sh</tspan></text>

  <!-- card 3 (stopped) -->
  <rect x="14" y="432" width="630" height="52" rx="6" ry="6" fill="none" stroke="#313244" stroke-width="1"/>
  <text x="26" y="453"><tspan class="red bold">&#x25CB;</tspan><tspan class="dim bold"> old-worker</tspan></text>
  <text x="34" y="472"><tspan class="label">State:    </tspan><tspan class="red">  exited</tspan></text>
</svg>
